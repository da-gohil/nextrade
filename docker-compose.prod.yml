version: '3.9'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 256M

  kafka:
    image: apache/kafka:3.7.0
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
    deploy:
      resources:
        limits:
          memory: 512M

  discovery:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-discovery:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  gateway:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-gateway:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  auth-service:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-auth:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  order-service:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-order:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  inventory-service:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-inventory:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  payment-service:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-payment:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  notification-service:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-notification:${IMAGE_TAG:-latest}
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod

  dashboard:
    image: ${IMAGE_PREFIX:-ghcr.io/da-gohil/nextrade}-nextrade-dashboard:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"

volumes:
  mysql_prod_data:
