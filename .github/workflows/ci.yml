name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Test all backend services
  # ──────────────────────────────────────────────
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Create databases
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
            CREATE DATABASE IF NOT EXISTS auth_db;
            CREATE DATABASE IF NOT EXISTS order_db;
            CREATE DATABASE IF NOT EXISTS inventory_db;
            CREATE DATABASE IF NOT EXISTS payment_db;
            CREATE DATABASE IF NOT EXISTS notification_db;
          "

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run unit tests
        run: mvn test -B -pl '!nextrade-dashboard'

      - name: Run integration tests
        run: mvn verify -B -pl '!nextrade-dashboard' -P integration-tests
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/auth_db
          SPRING_DATA_REDIS_HOST: 127.0.0.1

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: '**/target/site/jacoco/jacoco.xml'
          flags: backend

  # ──────────────────────────────────────────────
  # Job 2: Build & Test Angular frontend
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nextrade-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: nextrade-dashboard
        run: npm ci

      - name: Lint
        working-directory: nextrade-dashboard
        run: npm run lint

      - name: Build (production)
        working-directory: nextrade-dashboard
        run: npm run build -- --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: nextrade-dashboard/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3: Code quality checks
  # ──────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Check formatting (Spotless)
        run: mvn spotless:check -B -pl '!nextrade-dashboard'

      - name: OWASP Dependency Check
        run: mvn dependency-check:check -B -pl '!nextrade-dashboard' || true
        continue-on-error: true
